name: CI/CD Pipeline RAG Bot

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rag-assistant:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rag-assistant:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rag-assistant:buildcache,mode=max

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway via CLI
        run: |
          railway redeploy --project ${{ secrets.RAILWAY_PROJECT_ID }} -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}